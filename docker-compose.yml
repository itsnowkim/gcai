services:
  gcai:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: neo4jpass123
      NEO4J_DATABASE: neo4j
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports:
      - "${GCAI_APP_PORT:-8000}:8000"
    volumes:
      - ./:/workspace:ro
      - gcai-chroma-cache:/root/.cache/chroma
    depends_on:
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/neo4jpass123
    ports:
      - "${GCAI_NEO4J_HTTP_PORT:-7474}:7474"
      - "${GCAI_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpass123 'RETURN 1;' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  chroma:
    image: chromadb/chroma:1.5.3
    ports:
      - "${GCAI_CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma-data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/8000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  gcai-chroma-cache:
  neo4j-data:
  neo4j-logs:
  neo4j-plugins:
  chroma-data:
