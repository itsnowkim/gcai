services:
  gcai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gcai-app
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
